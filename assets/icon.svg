<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bellGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGrad)" stroke="#2e4a6e" stroke-width="4"/>
  <!-- Bell body -->
  <path d="M128 40 c-8 0-14 6-14 14 v4 c-28 8-42 32-42 60 v30 l-12 12 v6 h136 v-6 l-12-12 v-30 c0-28-14-52-42-60 v-4 c0-8-6-14-14-14z"
        fill="url(#bellGrad)" stroke="#E65100" stroke-width="2" stroke-linejoin="round"/>
  <!-- Clapper -->
  <ellipse cx="128" cy="172" rx="18" ry="8" fill="#F9A825" stroke="#E65100" stroke-width="1.5"/>
  <!-- Highlight on bell -->
  <path d="M96 90 c-12 12-18 28-18 46 v10" fill="none" stroke="#FFF9C4" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Alert dot -->
  <circle cx="178" cy="62" r="18" fill="#EF5350" stroke="#B71C1C" stroke-width="2"/>
  <text x="178" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="20" fill="white">!</text>
</svg>
